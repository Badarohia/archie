version: 1

disable_existing_loggers: false

formatters:
  standard:
    format: "[%(asctime)s] [%(levelname)s] %(name)s: %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: standard
    filename: storage/logs/archie.log
    maxBytes: 1048576
    backupCount: 5
    encoding: utf-8

root:
  level: INFO
  handlers:
    - console
    - file